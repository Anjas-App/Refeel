<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Refeel – Dein Begleiter für innere Balance</title>
  <style>
    /* Basierend auf deiner theme.js */
    :root {
      --primary: #B8A9D9;
      --secondary: #A8C09A;
      --background: #F2FADD;
      --surface: #F9F7F4;
      --accent: #E8D5E8;
      --text: #4A4A4A;
      --text-light: #7A7A7A;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, var(--background) 0%, var(--surface) 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo-container {
      width: 180px;
      height: 180px;
      margin-bottom: 20px;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .description {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: var(--text);
    }

    .feature-card {
      background-color: var(--surface);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--primary);
      box-shadow: 0 4px 15px rgba(184, 169, 217, 0.2);
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 40px;
    }

    .feature-title {
      font-weight: 600;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .feature-list {
      list-style: none;
      padding: 0;
      text-align: left;
    }

    .feature-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .bullet {
      width: 8px;
      height: 8px;
      background-color: var(--primary);
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .btn {
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 24px;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .footer-links {
      margin-top: auto;
      padding-top: 40px;
      font-size: 13px;
    }

    .footer-links a {
      color: var(--primary);
      text-decoration: none;
      margin: 0 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-container">
    <img src="https://github.com/Anjas-App/Refeel/refeel.png" alt="Refeel Logo" class="logo">
  </div>

  <p class="description">
    Dein persönlicher Begleiter für Selbstreflexion, emotionale Balance und innere Entwicklung.
  </p>

  <div class="feature-card">
    <div class="feature-title">Was dich erwartet:</div>
    <ul class="feature-list">
      <li class="feature-item"><span class="bullet"></span> Tägliches Stimmungs-Check-in</li>
      <li class="feature-item"><span class="bullet"></span> Persönliche Reflexionsfragen</li>
      <li class="feature-item"><span class="bullet"></span> Empathische Begleitung</li>
      <li class="feature-item"><span class="bullet"></span> Stimmungsverlauf & Einsichten</li>
    </ul>
  </div>

  <a href="#" class="btn">Jetzt starten</a>

  <div class="footer-links">
    <a href="privacy.html">Datenschutz</a>
    <a href="terms.html">Nutzungsbedingungen</a>
    <a href="konto_loeschen.html">Konto löschen</a>
  </div>
</div>

</body>
</html>
